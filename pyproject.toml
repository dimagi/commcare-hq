[build-system]
requires = ["setuptools"]

[project]
name = "commcare-hq"
readme = "README.md"
version = "1.0"
requires-python = ">=3.9,<3.10"
license = {file = "LICENSE"}

[project.urls]
Homepage = "https://www.commcarehq.org/"
Documentation = "https://commcare-hq.readthedocs.io/"
Repository = "https://github.com/dimagi/commcare-hq/"
Issues = "https://github.com/dimagi/commcare-hq/issues"

[project.entry-points.pytest11]
corehq = "corehq.tests.pytest_hooks"

[tool.setuptools]
py-modules = ["manage"]

[tool.setuptools.packages.find]
where = [".", "corehq/ex-submodules", "submodules"]
namespaces = false

[tool.pytest.ini_options]
minversion = "8.1"
addopts = [
    "--strict-markers",
    "-p", "no:warnings",  # HQ has its own (incompatible) warnings system
]
markers = [
    "es_test: marker for elasticsearch tests",
    "slow: marks tests as slow (deselect with -m 'not slow')",
    "skip_setup_users: skip user setup in importer tests",
]
empty_parameter_set_mark = "fail_at_collect"
xfail_strict = true

norecursedirs = [
    ".*",
    "*.egg",
    "artifacts",
    "docker",
    "git-hooks",
    "locale",
    "node_modules",
    "requirements",
    "scripts",
    "sharedfiles",
    "staticfiles",
]

python_files = [
    "test_*.py",
    "tests.py",
    "*/tests/*.py",
]

pythonpath = [
    "submodules/dimagi-utils-src",
    "submodules/django-digest-src",
    "submodules/toggle",
]

required_plugins = "pytest-django"
DJANGO_SETTINGS_MODULE = "testsettings"
