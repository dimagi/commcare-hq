{% load i18n %}
{% load hq_shared_tags %}

<div class="row mb-3" xmlns="http://www.w3.org/1999/html">
  <label class="col-form-label field-label" for="shadow-parent">
    {% trans "Shadow source" %}
    <span class="hq-help-template"
          data-content="{% blocktrans %}The form which this form will shadow{% endblocktrans %}"
    ></span>
  </label>
  <div class="field-control">
    <select id="shadow-parent" data-bind="value: shadow_parent" class="form-select">
      <option value=""></option>
      {% for key, display in form.get_shadow_parent_options %}
        <option value="{{ key }}">{{ display }}</option>
      {% endfor %}
    </select>

    <input type="hidden" name="shadow_parent" data-bind="value: shadow_parent"/>
  </div>
</div>
