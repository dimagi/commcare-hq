{% load i18n %}
{% load hq_shared_tags %}

{% include 'app_manager/partials/forms/case_config_ko_templates.html' %}

<script type="text/html" id="remove-action-modal-template">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">{% trans "Remove Form Action?" %}</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{% trans_html_attr 'Close' %}"></button>
      </div>
      <div class="modal-body">
        <p>{% trans "Are you sure you want to remove this action?" %}</p>
      </div>
      <div class="modal-footer">
        <a href="#" class="btn btn-outline-primary" data-bs-dismiss="modal">{% trans "Cancel" %}</a>
        <a class="btn btn-outline-danger" href="#" data-bind="click: $parent.removeFormAction" data-bs-dismiss="modal">{% trans "Remove Action" %}</a>
      </div>
    </div>
  </div>
</script>

<script type="text/html" id="case-config:case-action:body">
  <!--ko if: actionType == 'open'-->
  <div class="spacer"></div>
  <div class="card card-modern-gray mb-3">
    <div class="card-header h5">
      {% trans "Open Condition" %}
    </div>
    <div class="card-body">
      <div data-bind="template: {
              name: 'case-config:condition',
              data: {condition: open_condition, config: $data},
          }"></div>
    </div>
  </div>
  <!-- /ko -->
  <hr />
  <div data-bind="if: actionType == 'load' && !caseConfig.isShadowForm" class="d-flex flex-column gap-2">
    <div class="card card-modern-gray"
         data-bind="template: 'case-config:case-transaction:case-preload'"></div>
    <div class="card card-modern-gray"
         data-bind="template: 'case-config:case-transaction:case-properties'"></div>
  </div>
  <div data-bind="if: actionType == 'open'" class="d-flex flex-column gap-2">
    <div class="card card-modern-gray" data-bind="template: 'case-config:case-transaction:case-properties'"></div>
  </div>
  <!-- ko if:  actionType !== 'load' || !auto_select || auto_select.mode() !== 'usercase' -->
  <hr />
  <div class="card card-modern-gray mb-3">
    <div class="card-header h5">
      {% trans "Conditions" %}
    </div>
    <div class="card-body">

      <div class="form-horizontal">
        <!-- ko if:  actionType === 'load' -->
        {% if app.commtrack_enabled %}
          <!-- ko if:  allow_product_stock -->
          <div class="row mb-3">
            <label class="field-label pt-0">
              {% trans "Display the Product Stock for this Supply Point after it is selected" %}
            </label>
            <div class="col-md-4">
              <input type="checkbox" class="form-check-input" data-bind="checked: show_product_stock_var"/>
            </div>
          </div>
          <!-- ko if: show_product_stock_var -->
          <div class="row mb-3">
            <label class="field-label">
              {% trans "Only show products for program" %}
            </label>
            <div class="col-md-4">
              <select class="form-select" data-bind="optstr: $root.programs, value: product_program"></select>
            </div>
          </div>
          <!-- /ko -->
          <!-- /ko -->
        {% endif %}

        <!-- ko if:  !auto_select && $index() > 0 -->
        <div class="row mb-3">
          <label class="field-label">
          </label>
          <div class="col-md-4">
            <div class="form-check">
              <label class="form-check-label">
                <input class="form-check-input" type="checkbox" data-bind="checked: subcase"/>
                {% trans "This case is a subcase of the previous case" %}
              </label>
            </div>
            <span class="text-warning small" data-bind="text: validate_subcase, visible: validate_subcase"></span>
          </div>
        </div>
        <div class="row mb-3" data-bind="visible: subcase">
          <label class="field-label">
            {% trans "Parent reference ID" %}
          </label>
          <div class="col-md-4">
            <input type="text" class="form-control" data-bind="value: case_index.reference_id"/>
          </div>
        </div>
        <div class="row mb-3">
          <label class="field-label">{% trans "Relationship" %}</label>
          <div class="col-md-4">
            <select class="form-select"
                    data-bind="options: relationshipTypes,
                                               optionsCaption: 'Child case or extension case?',
                                               value: case_index.relationship"></select>
          </div>
        </div>
        <hr />
        <!-- /ko -->
        <!-- /ko -->

        <!-- ko if:  actionType === 'open' -->
        <div class="row mb-3" data-bind="visible: allow_subcase">

          <label class="field-label">{% trans "Parent Indices" %}</label>
          <div class="col-md-6">
            <div data-bind="foreach: case_indices">
              <div class="card card-body mb-3">
                <label>{% trans "Parent Tag" %}</label>
                <select class="form-select"
                        data-bind="optstr: $parents[1].getCaseTags('subcase', $parent), value: tag">
                </select>
                <br />

                <label>{% trans "Reference ID" %}</label>
                <input type="text" class="form-control" data-bind="value: reference_id"/>
                <br />

                <label>{% trans "Relationship" %}</label>
                <select class="form-select"
                        data-bind="options: $parent.relationshipTypes,
                                                       optionsCaption: ' ',
                                                       value: relationship"></select>
                <br />
                <div data-bind="visible: relationship() === 'question'">
                  <select data-bind="
                                            questionsSelect: $root.getQuestions('all', false, false),
                                            value: relationship_question,
                                            optionsCaption: ' ',
                                        "></select>
                </div>
                <br />
                <button class="btn btn-outline-danger" data-bind="click: $parent.removeCaseIndex">
                  <i class="fa-regular fa-trash-can"></i>
                  {% trans "Remove parent index" %}
                </button>
              </div>
            </div>

            <button class="btn btn-outline-primary" data-bind="click: addCaseIndex">
              <i class="fa fa-plus"></i>
              {% trans "Add parent index" %}
            </button>
            <span class="text-warning small" data-bind="text: validate_subcase, visible: validate_subcase"></span>
          </div>
        </div>
        <hr />
        <!-- /ko -->

        <!-- ko ifnot: caseConfig.isShadowForm -->
        <div class="form-check">
          <label class="form-check-label">
            <input class="form-check-input" type="checkbox" data-bs-toggle="toggle" data-bind="checked: close_case"/>
            {% trans "Close this case when the form is complete" %}
          </label>
        </div>
        <div class="close-action-container" data-bind="template: {
                        name: 'case-config:condition',
                        data: {condition: close_condition, config: $data},
                        if: close_case
                    }"></div>
        <!-- /ko -->
      </div>
    </div>
  </div>

  <!-- /ko -->
</script>

<script type="text/html" id="case-config:case-action">
  <div class="card-header h5 row align-items-center g-0"
       data-bind="css: {'not-droppable': moveable()}">
    <div class="col clickable" data-bs-toggle="collapse"
         data-bind="attr: {href: '#' + actionType + $index()}, html: header"></div>
    <div class="col-auto">
      <a href="#" role="button" class="case-action-move btn btn-purple grip" data-bind="visible: moveable()">
        <i class="fa-solid fa-up-down"></i>
      </a>
    </div>
    <div class="col-auto">
      <button
        class="case-action-remove btn btn-purple"
        data-bind="
          openModal: 'remove-action-modal-template',
          disable: hasLockedMappings(),
          attr: {
              title: hasLockedMappings() ?
                '{% trans_html_attr "This action cannot be removed because it references a locked question." %}'
                : ''
          }"
      >
        <i class="fa-regular fa-trash-can"></i>
      </button>
    </div>
  </div>
  <div class="panel-collapse collapse" data-bind="attr: {id: actionType + $index()}">
    <div class="card-body">
      <div class="card card-modern-gray mb-3">
        <div class="card-header h5">
          {% trans "Case Action Meta" %}
        </div>
        <div class="card-body">
          <div class="row align-items-center g-2">
            <div class="col-auto"><label class="col-form-label"><i class="fa fa-tag"></i> {% trans "Case Tag" %}</label></div>
            <div class="col-auto"><input type="text" class="form-control" data-bind="value: case_tag, disable: disable_tag" /></div>
            <div class="col-auto"><strong>(</strong></div>
            <div class="col-auto"><label class="col-form-label">{% trans "Case Type" %}</label></div>
            <div class="col-auto">
              <select class="form-select" data-bind="
                              options: caseConfig.caseTypes,
                              value: case_type,
                              optionsCaption: 'Choose a Case Type...'
                          "></select>
            </div>
            <!-- ko if: actionType == 'load'-->
            <div class="col-auto">{% trans "from" %}</div>
            <div class="col-auto"><label class="col-form-label"><i class="fa-solid fa-list-check"></i> {% trans "Case List" %}</label></div>
            <div class="col-auto">
              <select class="form-select" data-bind="optstr: available_modules,
                              optstrValue: 'id',
                              optstrText: 'module_name',
                              value: details_module">
              </select>
            </div>
            <!-- /ko -->
            <div class="col-auto"><strong>)</strong></div>
            <div class="col-12"><span class="text-warning small" data-bind="text: validate, visible: validate"></span></div>
          </div>
          <div class="alert alert-warning" data-bind="visible: !case_type">
            {% trans "Please select a case type." %}
          </div>
        </div>
      </div>
      <div data-bind="visible: case_type">
        <!-- ko template: {name: 'case-config:case-action:body'} --><!-- /ko -->
      </div>
    </div>
  </div>
</script>

<script type="text/html" id="auto-select:case-type">
  <div class="col-auto"><label class="col-form-label">{% trans "Expected Case Type" %}</label></div>
  <div class="col-auto"><input type="text" class="form-control" data-bind="value: $parent.case_type" /></div>
  <div class="col-auto"><span class="hq-help-template"
        data-title="{% trans "Expected Case Type" %}"
        data-content="{% blocktrans %}This is used for case property suggestions and when creating case indexes but
              it does not get validated against the loaded case.{% endblocktrans %}"
  ></span></div>
</script>

<script type="text/html" id="auto-select:undefined">
</script>

<script type="text/html" id="case-config:case-action-load-case-from-fixture">
  <div class="card-header h5 row align-items-center g-0">
    <div class="col clickable" data-bs-toggle="collapse"
         data-bind="attr: {href: '#' + actionType + $index()}, html: header"></div>
    <div class="col-auto">
      <a href="#" role="button" class="case-action-move btn btn-purple grip" data-bind="visible: moveable()">
        <i class="fa-solid fa-up-down"></i>
      </a>
    </div>
    <div class="col-auto">
      <button
        class="case-action-remove btn btn-purple"
        data-bind="
          openModal: 'remove-action-modal-template',
          disable: hasLockedMappings(),
          attr: {
              title: hasLockedMappings() ?
                '{% trans_html_attr "This action cannot be removed because it references a locked question." %}'
                : ''
          }"
      >
        <i class="fa-regular fa-trash-can"></i>
      </button>
    </div>
  </div>
  <div class="panel-collapse collapse" data-bind="attr: {id: actionType + $index()}">
    <div class="card-body">
      <div class="card card-modern-gray mb-3">
        <div class="card-header h5">
          {% trans "Case Action Meta" %}
        </div>
        <div class="card-body">
          <div class="row align-items-center g-2">
            <div class="col-auto"><label class="col-form-label"><i class="fa fa-tag"></i> {% trans "Case Tag" %}</label></div>
            <div class="col-auto"><input type="text" class="form-control" data-bind="value: case_tag, disable: disable_tag" /></div>
            <div class="col-auto"><strong>(</strong></div>
            <div class="col-auto"><label class="col-form-label">{% trans "Case Type" %}</label></div>
            <div class="col-auto">
              <select class="form-select" data-bind="
                                options: caseConfig.caseTypes,
                                value: case_type,
                                optionsCaption: 'Choose a Case Type...'
                            "></select>
            </div>

            <!-- ko if: actionType == 'load'-->
            <div class="col-auto">{% trans "from" %}</div>
            <div class="col-auto"><label class="col-form-label"><i class="fa-solid fa-list-check"></i> {% trans "Case List" %}</label></div>
            <div class="col-auto">
              <select class="form-select" data-bind="optstr: available_modules,
                                optstrValue: 'id',
                                optstrText: 'module_name',
                                value: details_module">
              </select>
            </div>
            <!-- /ko -->
            <div class="col-auto"><strong>)</strong></div>
            <div class="col-12"><p class="text-warning small mb-0" data-bind="text: validate, visible: validate"></p></div>
          </div>
          <div class="help-block" data-bind="visible: !case_type">
            {% trans "Please select a case type." %}
          </div>
          <div class="card card-body p-2 mb-3">
            <div class="row align-items-center g-2">
              <div class="col-auto"><label class="col-form-label">{% trans "Case Property" %}</label></div>
              <div class="col-auto"><input type="text" class="form-control" data-bind="value: load_case_from_fixture.case_property" /></div>
              <div class="col-auto">
                <div class="form-check">
                  <label class="form-check-label">
                    <input class="form-check-input" type="checkbox" data-bind="checked: load_case_from_fixture.auto_select" />
                    {% trans "Autoselect If Only One Case" %}
                  </label>
                </div>
              </div>
            </div>
          </div>
          <div class="card card-body p-2 mb-3">
            <div class="row align-items-center g-2">
              <div class="col-auto"><label class="col-form-label">{% trans "Fixture Nodeset" %}</label></div>
              <div class="col-auto"><input type="text" class="form-control nodeset" data-bind="value: load_case_from_fixture.fixture_nodeset" /></div>
              <div class="col-auto"><label class="col-form-label">{% trans "Fixture Tag" %}</label></div>
              <div class="col-auto"><input type="text" class="form-control" data-bind="value: load_case_from_fixture.fixture_tag" /></div>
              <div class="col-auto"><label class="col-form-label">{% trans "Fixture Variable" %}</label></div>
              <div class="col-auto"><input type="text" class="form-control" data-bind="value: load_case_from_fixture.fixture_variable" /></div>
              <div class="col-auto">
                <div class="form-check">
                  <label class="form-check-label">
                    <input class="form-check-input" type="checkbox" data-bind="checked: load_case_from_fixture.auto_select_fixture" />

              <div class="col-auto"><label class="col-form-label">{% trans "Arbitrary Datum id" %}</label></div>
              <div class="col-auto"><input type="text" class="form-control" data-bind="value: load_case_from_fixture.arbitrary_datum_id" /></div>
            </div>
          </div>
        </div>
      </div>
      <div data-bind="visible: case_type">
        <!-- ko template: {name: 'case-config:case-action:body'} --><!-- /ko -->
      </div>
    </div>
  </div>
</script>

<div id="case-config-ko">
  <div data-bind="saveButton: saveButton"></div>
  <div data-bind="with: caseConfigViewModel">
    <div class="btn-group" data-bind="visible: actionOptions().length">
      <button type="button" class="btn btn-purple dropdown-toggle" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
        <i class="fa fa-plus"></i>
        <span>{% trans "Add Action" %}</span>
      </button>
      <ul class="dropdown-menu" role="menu" data-bind="foreach: actionOptions">
        <!-- ko if: value === 'separator' -->
        <li><hr class="dropdown-divider"></li>
        <!-- /ko -->
        <!-- ko ifnot: value === 'separator' -->
        <li><a href="#" class="dropdown-item" data-bind="click: $parent.addFormAction, text: display"></a></li>
        <!-- /ko -->
      </ul>
    </div>
    <div data-bind="visible: !actionOptions().length">
      <i class="fa fa-plus icon-muted"></i>
      <span class="text-body-secondary">{% trans "Add Action" %}</span>
    </div>
    <div class="spacer"></div>
    <div class="card card-modern-gray mb-3" data-bind="visible: load_update_cases().length">
      <div class="card-header h5">
        {% trans "Load / Update / Close Cases" %}
      </div>
      <div class="card-body">
        <div id="case-load-accordion" class="d-flex flex-column gap-2" data-bind="foreach: load_update_cases, sortableList: load_update_cases, sortableListSelector: 'div:not(.not-droppable)'">
          <!-- ko if: auto_select -->
          <div class="card card-modern-gray card-case-actions" data-bind="template: {name: 'case-config:case-action-auto-select'}"></div>
          <!-- /ko -->
          <!-- ko if: load_case_from_fixture -->
          <div class="card card-modern-gray card-case-actions" data-bind="template: {name: 'case-config:case-action-load-case-from-fixture'}"></div>
          <!-- /ko -->
          <!-- ko ifnot: auto_select || load_case_from_fixture -->
          <div class="card card-modern-gray card-case-actions" data-bind="template: {name: 'case-config:case-action'}"></div>
          <!-- /ko -->
        </div>
      </div>
    </div>
    <div class="spacer" data-bind="visible: open_cases().length && load_update_cases().length"></div>

    <div class="card card-modern-gray mb-3" data-bind="visible: open_cases().length">
      <div class="card-header h5">
        {% trans "Open New Cases" %}
      </div>
      <div class="card-body">
        <div id="case-open-accordion" class="d-flex flex-column gap-2" data-bind="foreach: open_cases">
          <div class="card card-modern-gray card-case-actions" data-bind="template: {name: 'case-config:case-action'}"></div>
        </div>
      </div>
    </div>
    <div class="spacer" data-bind="visible: arbitrary_datums().length">
    </div>
    <div class="card card-modern-gray mb-3">
      <div class="card-header h5">
        {% trans "Arbitrary Datums" %}
      </div>
      <div class="card-body">
        <div id="arbitrary-datums" class="d-flex flex-column gap-3">
          <table data-bind="visible: arbitrary_datums().length" class="col-md-12 table table-savecaseprops">
            <thead>
              <tr>
                <th class="col-md-2"></th>
                <th class="col-md-5">
                  {% trans "Datum ID" %}
                </th>
                <th class="col-md-5">
                  {% trans "Datum Function" %}
                </th>
              </tr>
            </thead>
            <tbody data-bind="foreach: arbitrary_datums">
              <tr>
                <td class="col-md-1 text-center">
                  <button class="btn btn-outline-danger" data-bind="click: $parent.removeDatum">
                    <i class="fa fa-remove"></i>
                  </button>
                </td>
                <td class="col-md-5 text-center">
                  <input type="text" class="form-control textbox" data-bind="textInput: datum_id" />
                </td>
                <td class="col-md-5 text-center">
                  <input type="text" class="form-control textbox" data-bind="textInput: datum_function" />
                </td>
              </tr>
            </tbody>
          </table>
          <br><br>
        </div>
        <div class="col-sm-12 col-md-6">
          <button class="btn btn-primary" data-bind="click: addDatum">
            {% trans "Add Datum" %}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
