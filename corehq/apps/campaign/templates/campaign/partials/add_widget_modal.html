{% load crispy_forms_tags %}

  id="add-widget-modal"

  role="dialog"
>

    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{% trans "Add Widget" %}</h5>

        ></button>
      </div>
      <div class="modal-body" id="add-widget-modal-body">
      </div>
    </div>
  </div>
</div>
