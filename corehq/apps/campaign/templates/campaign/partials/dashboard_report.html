{% load hq_shared_tags %}
{% load i18n %}

<div id="report-widget-{{ widget.id }}" class="paginated-report-widget mb-4">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="mb-0">{{ widget.title }}</h5>
    </div>

    <!-- TODO: This needs pagination support -->
    <div class="card-body p-0">
      <div id="error-alert-{{ widget.id }}" class="alert alert-danger d-none">
        {% blocktrans %}
          Something went wrong while loading this widget! Please try again.
        {% endblocktrans %}
      </div>
      <div class="row g-0">
        <!-- Left Column: Filter Space -->
        <div class="col-md-4 border-end">
          <div id="report-widget-filters-{{ widget.id }}" class="p-3">
            {% include "reports/standard/partials/bootstrap5/filter_panel.html" %}
          </div>
        </div>

        <!-- Right Column: Table -->
        <div class="col-md-8">
          <div class="position-relative">
            <div
              id="report-container-{{ widget.id }}"
              data-report-configuration-id="{{ widget.report_configuration_id }}"
              class="report-container"
              style="height:500px"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
