{% load i18n %}
{# Query tester: posts the current builder query (the hidden `query` field,  #}
{# kept current by Alpine) plus the case type to the test endpoint and swaps #}
{# the rendered results/errors into #test-results. `closest form` also       #}
{# carries the CSRF token.                                                    #}

<template x-for="(param, idx) in parameters" :key="idx">
  <div class="row mb-2">
    <label
      class="col-sm-2 form-label fw-semibold p-0"
      :for="'param-value-' + idx"
      x-text="param.name"
    ></label>
    <div class="col-sm-10 ">
      <template x-if="param.type === 'date'">
        <div
          class="input-group"
          data-td-target-input="nearest"
          data-td-target-toggle="nearest"
        >
          <input
            type="text"
            class="form-control font-monospace"
            :id="'param-value-' + idx"
            x-model="testParamValues[param.name]"
            x-datepicker='{"useInputGroup": true}'
            autocomplete="off"
          />
          <button
            class="btn btn-outline-secondary"
            type="button"
            data-td-toggle="datetimepicker"
          >
            <i class="fa-solid fa-calendar-days"></i>
          </button>
        </div>
      </template>
      <template x-if="param.type !== 'date'">
        <input
          type="text"
          class="form-control font-monospace flex-grow-1"
          :id="'param-value-' + idx"
          x-model="testParamValues[param.name]"
        />
      </template>
    </div>
  </div>
</template>

<button
  type="button"
  class="btn btn-secondary"
  hx-post="{% url 'case_search_endpoint_test' domain %}"
  hx-include="closest form"
  :hx-vals="JSON.stringify({test_param_values: testParamValues})"
  hx-target="#test-results"
  hx-swap="innerHTML"
  hx-indicator="#test-spinner"
>
  {% trans "Test query" %}
</button>

<span
  id="test-spinner"
  class="htmx-indicator spinner-border spinner-border-sm ms-2"
  role="status"
></span>
<div id="test-results"></div>
