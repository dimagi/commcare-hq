name: commcare-hq tests
on:
  pull_request:
    branches:
    - master
    - hotfix-deploy
  schedule:
    # see corehq/apps/hqadmin/management/commands/static_analysis.py
    - cron: '47 12 * * *'
  workflow_dispatch:
jobs:
  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
        - {TEST: python, DIVIDED_WE_RUN: '05'}
        - {TEST: python, DIVIDED_WE_RUN: '6a'}
        - {TEST: python, DIVIDED_WE_RUN: 'bf'}
        - {TEST: python-sharded-and-javascript}
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
      REUSE_DB: true  # do not drop databases on completion to save time
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Docker info
      run: |
        docker version
        docker compose version
    - name: Docker login
      env:
        TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      if: env.TOKEN != ''
      uses: docker/login-action@v3
      with:
        username: dimagi
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container
        driver-opts: network=host
    - name: Build web image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        tags: hqtest-web
        load: true
        cache-from: type=gha,scope=web
        cache-to: type=gha,scope=web,mode=max
    - name: Build couch image
      uses: docker/build-push-action@v6
      with:
        context: docker/files
        file: docker/files/Dockerfile.couch
        tags: hqtest-couch
        load: true
        cache-from: type=gha,scope=couch
        cache-to: type=gha,scope=couch,mode=max
    - name: Build elasticsearch6 image
      uses: docker/build-push-action@v6
      with:
        context: docker
        file: docker/files/Dockerfile.es.6
        tags: hqtest-elasticsearch6
        load: true
        cache-from: type=gha,scope=es6
        cache-to: type=gha,scope=es6,mode=max
    - name: Run tests
      env:
        TEST: ${{ matrix.TEST }}
        DIVIDED_WE_RUN: ${{ matrix.DIVIDED_WE_RUN }}
        JS_SETUP: yes
        KAFKA_HOSTNAME: kafka
        STRIPE_PRIVATE_KEY: ${{ secrets.STRIPE_PRIVATE_KEY }}
      run: >-
        scripts/docker test
        --exitfirst
        --verbosity=2
        --reusedb=1
        --no-migrations
        --divided-we-run=${{ matrix.DIVIDED_WE_RUN }}
        --showlocals
        --max-test-time=29
        -p no:cacheprovider
    - name: "Codecov upload"
      env:
        TOKEN: ${{ secrets.CODECOV_TOKEN }}
      if: env.TOKEN != ''
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        fail_ci_if_error: true
    - name: Stop containers
      if: always()
      run: scripts/docker down
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: test-artifacts
        path: artifacts
        if-no-files-found: ignore
        retention-days: 7
