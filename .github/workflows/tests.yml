name: commcare-hq tests
on:
  pull_request:
    branches:
    - master
    - hotfix-deploy
  schedule:
    # see corehq/apps/hqadmin/management/commands/static_analysis.py
    - cron: '47 12 * * *'
  workflow_dispatch:
jobs:
  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
        - {TEST: python, DIVIDED_WE_RUN: '05'}
        - {TEST: python, DIVIDED_WE_RUN: '6a'}
        - {TEST: python, DIVIDED_WE_RUN: 'bf'}
        - {TEST: python-sharded-and-javascript}
    env:
      DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
      DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
      REUSE_DB: true  # do not drop databases on completion to save time
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Docker info
      run: |
        docker version
        docker compose version
    - name: Docker login
      env:
        TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      if: env.TOKEN != ''
      uses: docker/login-action@v3
      with:
        username: dimagi
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Restore Docker image cache
      id: docker-cache
      uses: actions/cache/restore@v4
      with:
        path: /tmp/docker-cache
        key: docker-images-v1-${{ hashFiles('docker/hq-compose.yml', 'docker/hq-compose-os-default.yml', 'docker/Dockerfile', 'docker/files/Dockerfile.*') }}
        restore-keys: |
          docker-images-v1-
    - name: Load cached Docker images
      if: steps.docker-cache.outputs.cache-hit == 'true'
      run: zstd -d /tmp/docker-cache/images.tar.zst --stdout | docker load
    - name: Run tests
      env:
        TEST: ${{ matrix.TEST }}
        DIVIDED_WE_RUN: ${{ matrix.DIVIDED_WE_RUN }}
        JS_SETUP: yes
        KAFKA_HOSTNAME: kafka
        STRIPE_PRIVATE_KEY: ${{ secrets.STRIPE_PRIVATE_KEY }}
      run: >-
        scripts/docker test
        --exitfirst
        --verbosity=2
        --reusedb=1
        --no-migrations
        --divided-we-run=${{ matrix.DIVIDED_WE_RUN }}
        --showlocals
        --max-test-time=29
        -p no:cacheprovider
    - name: "Codecov upload"
      env:
        TOKEN: ${{ secrets.CODECOV_TOKEN }}
      if: env.TOKEN != ''
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        fail_ci_if_error: true
    - name: Stop containers
      if: always()
      run: scripts/docker down
    - name: Save Docker images to cache
      if: always() && steps.docker-cache.outputs.cache-hit != 'true'
      run: |
        mkdir -p /tmp/docker-cache
        # Save pulled and base images for future runs. Shared layers
        # are deduplicated in the tarball. zstd is used for fast
        # compression/decompression.
        docker save \
          dimagi/commcarehq-py3.13:latest \
          dimagi/docker-postgresql:14 \
          redis:7 \
          zookeeper:3.7 \
          confluentinc/cp-kafka:7.2.14 \
          minio/minio \
          apache/couchdb:3.5.0 \
          docker.elastic.co/elasticsearch/elasticsearch:6.8.23 \
        | zstd -T0 -3 > /tmp/docker-cache/images.tar.zst
    - name: Upload Docker image cache
      if: always() && steps.docker-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: /tmp/docker-cache
        key: docker-images-v1-${{ hashFiles('docker/hq-compose.yml', 'docker/hq-compose-os-default.yml', 'docker/Dockerfile', 'docker/files/Dockerfile.*') }}
    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: test-artifacts
        path: artifacts
        if-no-files-found: ignore
        retention-days: 7
